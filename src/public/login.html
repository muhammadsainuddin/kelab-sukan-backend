<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGEO - SECURITY GATEWAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #030303; color: #fff; margin: 0; 
            font-family: 'Share Tech Mono', monospace; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-box {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.2); 
            padding: 40px; width: 400px; position: relative;
        }
        .login-box::before { content: ''; position: absolute; top: -1px; left: -1px; width: 15px; height: 15px; border-top: 2px solid #fff; border-left: 2px solid #fff; }
        .login-box::after { content: ''; position: absolute; bottom: -1px; right: -1px; width: 15px; height: 15px; border-bottom: 2px solid #fff; border-right: 2px solid #fff; }
        
        .title { font-size: 24px; letter-spacing: 5px; text-shadow: 0 0 10px #fff; text-align: center; margin-bottom: 5px; }
        .subtitle { font-size: 10px; color: #888; text-align: center; letter-spacing: 2px; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; display: flex; align-items: center; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .prompt { color: #888; margin-right: 10px; }
        input { 
            background: transparent; border: none; color: #fff; font-family: 'Share Tech Mono', monospace; 
            font-size: 16px; outline: none; width: 100%; text-shadow: 0 0 5px #fff; letter-spacing: 2px;
        }
        
        button {
            background: transparent; border: 1px solid #fff; color: #fff; font-family: 'Share Tech Mono', monospace;
            padding: 10px; width: 100%; cursor: pointer; transition: all 0.3s; letter-spacing: 3px; margin-top: 10px;
        }
        button:hover { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }
        
        .error { color: #ff3333; font-size: 12px; text-align: center; margin-top: 15px; display: none; text-shadow: 0 0 5px #ff3333;}
    </style>
</head>
<body>
    <div class="login-box">
        <div class="title">AIGEO GATEWAY</div>
        <div class="subtitle">RESTRICTED ACCESS ONLY</div>
        
        <div class="input-group">
            <span class="prompt">AUTH_CODE></span>
            <input type="password" id="password" autocomplete="off" autofocus>
        </div>
        
        <button onclick="login()">INITIALIZE UPLINK</button>
        <div class="error" id="errorMsg">ACCESS DENIED. INVALID CREDENTIALS.</div>
    </div>

    <script>
        async function login() {
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const response = await fetch('/api/aigeo/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Simpan JWT di dalam localStorage pelayar web
                    localStorage.setItem('aigeo_token', data.token);
                    window.location.href = '/'; // Bawa ke dashboard
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.innerText = "SERVER DISCONNECTED.";
                errorMsg.style.display = 'block';
            }
        }

        // Benarkan tekan 'Enter' untuk log masuk
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
